# EvalX Infrastructure Stack
# Usage: docker compose up -d

services:
  # ============================================================
  # PostgreSQL 15 + pgvector extension
  # Pre-built image with vector extension for embedding similarity
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: evalx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evalx
      POSTGRES_PASSWORD: evalx
      POSTGRES_DB: evalx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalx -d evalx"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7 - Real-time state and Socket.io adapter
  # Used for: run progress counters, pub/sub for live updates
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: evalx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Redpanda - Kafka-compatible streaming platform
  # Lighter than Apache Kafka, no JVM, no ZooKeeper
  # Topics: evaluation.tasks, evaluation.results
  # ============================================================
  redpanda:
    image: redpandadata/redpanda:v23.3.5
    container_name: evalx-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --default-log-level=warn
    ports:
      - "19092:19092"  # Kafka API (external)
      - "18081:18081"  # Schema Registry (external)
      - "18082:18082"  # HTTP Proxy (external)
      - "9644:9644"    # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redpanda Console - Web UI for Kafka topics
  # Useful for debugging message flow
  # ============================================================
  redpanda-console:
    image: redpandadata/console:v2.4.3
    container_name: evalx-redpanda-console
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy

  # ============================================================
  # Prometheus - Metrics collection
  # Scrapes /metrics endpoints from API, Worker, Evaluator
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: evalx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # ============================================================
  # Grafana - Visualization dashboards
  # Pre-configured with Prometheus datasource
  # ============================================================
  grafana:
    image: grafana/grafana:10.3.3
    container_name: evalx-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"  # 3030 to avoid conflict with frontend dev server
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: evalx
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
